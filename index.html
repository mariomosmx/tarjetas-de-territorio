<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjetas de Territorio</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Territorio" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    /* ── Tokens ───────────────────────────────────────────── */
    :root {
      --bg:        #0f1117;
      --surface:   #181b24;
      --border:    #262a36;
      --accent:    #4f7cff;
      --accent-dim:#1e2d5a;
      --text:      #e8eaf0;
      --muted:     #7b8198;
      --radius:    12px;
      --gap:       12px;
    }

    /* ── Reset ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    .badge-offline {
      display: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 100px;
      padding: 3px 9px;
    }

    body.offline .badge-offline { display: flex; align-items: center; gap: 4px; }

    /* ── Search ───────────────────────────────────────────── */
    .search-wrap {
      margin-top: 10px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px 9px 34px;
      outline: none;
      transition: border-color .15s;
    }

    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    /* ── Grid ─────────────────────────────────────────────── */
    main {
      padding: var(--gap);
    }

    #count {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap);
    }

    @media (min-width: 480px) { #grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 720px) { #grid { grid-template-columns: repeat(4, 1fr); } }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active { transform: scale(0.97); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 3/2;
      object-fit: cover;
      display: block;
      background: var(--border);
    }

    .card-label {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }

    /* ── Empty state ──────────────────────────────────────── */
    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    #empty svg { width: 36px; height: 36px; opacity: .4; }

    /* ── Lightbox ─────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 12px;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 100%;
      max-height: calc(100dvh - 100px);
      border-radius: var(--radius);
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,.8);
    }

    .lb-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .lb-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .lb-btn:active { background: var(--border); }
    .lb-btn svg { width: 18px; height: 18px; }

    .lb-name {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-align: center;
      min-width: 100px;
    }

    /* ── Install banner ───────────────────────────────────── */
    #install-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      gap: 12px;
      align-items: center;
    }

    #install-bar.visible { display: flex; }

    #install-bar p {
      flex: 1;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    #install-bar strong { color: var(--text); }

    .btn-install {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-dismiss {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    /* ── Swipe hint ───────────────────────────────────────── */
    .lb-hint {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.04em;
    }
  </style>
</head>

      </div>

        Sin conexión
      </span>
    </div>
    <div class="search-wrap">

    </div>
  </main>

  <!-- Lightbox -->

    <img id="lb-img" src="" alt="" />
    <div class="lb-controls">
      <button class="lb-btn" id="lb-prev" aria-label="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="lb-name" id="lb-name"></span>
      <button class="lb-btn" id="lb-next" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <button class="lb-btn" id="lb-close" aria-label="Cerrar" style="position:absolute;top:16px;right:16px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <p class="lb-hint">Desliza para navegar</p>
  </div>

    function renderGrid(images) {
      filteredImages = images;

      if (images.length === 0) {
        empty.style.display = 'flex';

        card.addEventListener('click', () => openLightbox(i));
        grid.appendChild(card);
      });
    }

    search.addEventListener('input', () => {
      const q = search.value.toLowerCase().trim();
      const filtered = q
        ? IMAGES.filter(img => img.label.toLowerCase().includes(q) || img.file.toLowerCase().includes(q))
        : [...IMAGES];
      renderGrid(filtered);
    });

    renderGrid(IMAGES);

    // ── Lightbox ──────────────────────────────────────────────────────
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lb-img');
    const lbName  = document.getElementById('lb-name');
    const lbClose = document.getElementById('lb-close');
    const lbPrev  = document.getElementById('lb-prev');
    const lbNext  = document.getElementById('lb-next');

    function openLightbox(index) {
      lbIndex = index;
      updateLightbox();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const img = filteredImages[lbIndex];
      lbImg.src = `images/${img.file}`;
      lbImg.alt = img.label;
      lbName.textContent = img.label;
    }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => {
      lbIndex = (lbIndex - 1 + filteredImages.length) % filteredImages.length;
      updateLightbox();
    });
    lbNext.addEventListener('click', () => {
      lbIndex = (lbIndex + 1) % filteredImages.length;
      updateLightbox();
    });

    lb.addEventListener('click', e => {
      if (e.target === lb) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbPrev.click();
      if (e.key === 'ArrowRight') lbNext.click();
    });

    // ── Swipe en lightbox ─────────────────────────────────────────────
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        dx < 0 ? lbNext.click() : lbPrev.click();
      }
    });

    // ── Install banner (Android/Chrome) ───────────────────────────────
    let deferredPrompt = null;
    const installBar  = document.getElementById('install-bar');
    const btnInstall  = document.getElementById('btn-install');
    const btnDismiss  = document.getElementById('btn-dismiss');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBar.classList.add('visible');
    });

    btnInstall.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBar.classList.remove('visible');
    });

    btnDismiss.addEventListener('click', () => {
      installBar.classList.remove('visible');
    });

    window.addEventListener('appinstalled', () => {
      installBar.classList.remove('visible');
    });
  </script>
</body>
</html>
